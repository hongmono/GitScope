name: Release

on:
  pull_request:
    branches:
      - release
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: GitScope
  PROJECT: GitScope.xcodeproj
  SCHEME: GitScope
  VERSION_PREFIX: "0.1"
  DEVELOPMENT_TEAM: THG2GV26Z9

jobs:
  validate:
    name: Release build validation
    runs-on: macos-15
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build unsigned Apple Silicon app
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$RUNNER_TEMP/ValidationDerivedData" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

  publish:
    name: Sign, notarize, and publish
    needs: validate
    if: >-
      github.ref == 'refs/heads/release' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      vars.RELEASE_ENABLED == 'true'
    runs-on: macos-15
    environment: release
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Validate release secrets
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          required_variables=(
            APPLE_CERTIFICATE_BASE64
            APPLE_CERTIFICATE_PASSWORD
            APPLE_SIGNING_IDENTITY
            APPLE_API_KEY_ID
            APPLE_API_ISSUER_ID
            APPLE_API_PRIVATE_KEY
            SPARKLE_ED_PRIVATE_KEY
          )

          for variable in "${required_variables[@]}"; do
            if [[ -z "${!variable:-}" ]]; then
              echo "::error::Missing required GitHub Actions secret: $variable"
              exit 1
            fi
          done

      - name: Prepare release metadata
        run: |
          set -euo pipefail
          version="${VERSION_PREFIX}.${GITHUB_RUN_NUMBER}"
          tag="v${version}"
          derived_data="$RUNNER_TEMP/ReleaseDerivedData"
          app_path="$derived_data/Build/Products/Release/${APP_NAME}.app"
          artifact_dir="$RUNNER_TEMP/artifacts"

          {
            echo "VERSION=$version"
            echo "RELEASE_TAG=$tag"
            echo "DERIVED_DATA=$derived_data"
            echo "APP_PATH=$app_path"
            echo "ARTIFACT_DIR=$artifact_dir"
          } >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_path="$RUNNER_TEMP/gitscope-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "$APPLE_CERTIFICATE_BASE64" | /usr/bin/base64 -D > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

          echo "KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"

      - name: Build and sign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$APPLE_SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            build

          info_plist="$APP_PATH/Contents/Info.plist"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$info_plist")" = "$VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$info_plist")" = "$GITHUB_RUN_NUMBER"
          test -n "$(/usr/libexec/PlistBuddy -c 'Print :SUPublicEDKey' "$info_plist")"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          sparkle_framework="$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/Current"
          signed_items=(
            "$APP_PATH"
            "$sparkle_framework"
            "$sparkle_framework/Autoupdate"
            "$sparkle_framework/Updater.app"
            "$sparkle_framework/XPCServices/Downloader.xpc"
            "$sparkle_framework/XPCServices/Installer.xpc"
          )

          for signed_item in "${signed_items[@]}"; do
            codesign -dvv "$signed_item" 2>&1 | grep -q '^Timestamp='
          done

      - name: Notarize app
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          notarization_archive="$RUNNER_TEMP/${APP_NAME}-notarization.zip"
          notarization_result="$RUNNER_TEMP/notarization-result.json"
          notarization_log="$RUNNER_TEMP/notarization-log.json"

          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$api_key_path"
          chmod 600 "$api_key_path"
          ditto -c -k --keepParent "$APP_PATH" "$notarization_archive"
          xcrun notarytool submit "$notarization_archive" \
            --key "$api_key_path" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait \
            --output-format json > "$notarization_result"

          notarization_id="$(plutil -extract id raw -o - "$notarization_result")"
          notarization_status="$(plutil -extract status raw -o - "$notarization_result")"
          if [[ "$notarization_status" != "Accepted" ]]; then
            xcrun notarytool log "$notarization_id" \
              --key "$api_key_path" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" \
              "$notarization_log" || true
            test ! -s "$notarization_log" || cat "$notarization_log"
            echo "::error::Apple notarization failed with status: $notarization_status"
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"

      - name: Package release artifact
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          archive="$ARTIFACT_DIR/${APP_NAME}-${VERSION}-macOS-arm64.zip"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$archive"
          (
            cd "$ARTIFACT_DIR"
            shasum -a 256 "$(basename "$archive")" > "$(basename "$archive").sha256"
          )

          {
            echo "RELEASE_ARCHIVE=$archive"
            echo "RELEASE_CHECKSUM=$archive.sha256"
          } >> "$GITHUB_ENV"

      - name: Generate signed Sparkle appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          sparkle_bin="$DERIVED_DATA/SourcePackages/artifacts/sparkle/Sparkle/bin"
          generate_appcast="$sparkle_bin/generate_appcast"
          appcast_dir="$RUNNER_TEMP/appcast"

          test -x "$generate_appcast"
          mkdir -p "$appcast_dir"
          cp "$RELEASE_ARCHIVE" "$appcast_dir/"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/" \
            --link "https://github.com/$GITHUB_REPOSITORY" \
            --full-release-notes-url "https://github.com/$GITHUB_REPOSITORY/releases" \
            "$appcast_dir"

          appcast="$appcast_dir/appcast.xml"
          test -s "$appcast"
          grep -q 'sparkle:edSignature=' "$appcast"
          grep -q 'sparkle-signatures:' "$appcast"
          cp "$appcast" "$ARTIFACT_DIR/appcast.xml"
          echo "RELEASE_APPCAST=$ARTIFACT_DIR/appcast.xml" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          archive_name="$(basename "$RELEASE_ARCHIVE")"
          checksum_name="$(basename "$RELEASE_CHECKSUM")"
          appcast_name="$(basename "$RELEASE_APPCAST")"

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            is_draft="$(gh release view "$RELEASE_TAG" \
              --json isDraft \
              --jq .isDraft \
              --repo "$GITHUB_REPOSITORY")"
            if [[ "$is_draft" != "true" ]]; then
              echo "Release $RELEASE_TAG is already published; leaving its assets unchanged."
              exit 0
            fi

            gh release upload "$RELEASE_TAG" \
              "$RELEASE_ARCHIVE" \
              "$RELEASE_CHECKSUM" \
              "$RELEASE_APPCAST" \
              --clobber \
              --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" \
              --draft \
              --generate-notes \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "GitScope $RELEASE_TAG"
            gh release upload "$RELEASE_TAG" \
              "$RELEASE_ARCHIVE" \
              "$RELEASE_CHECKSUM" \
              "$RELEASE_APPCAST" \
              --repo "$GITHUB_REPOSITORY"
          fi

          uploaded_assets="$(gh release view "$RELEASE_TAG" \
            --json assets \
            --jq '.assets[].name' \
            --repo "$GITHUB_REPOSITORY")"
          grep -Fxq "$archive_name" <<< "$uploaded_assets"
          grep -Fxq "$checksum_name" <<< "$uploaded_assets"
          grep -Fxq "$appcast_name" <<< "$uploaded_assets"
          gh release edit "$RELEASE_TAG" \
            --draft=false \
            --latest \
            --repo "$GITHUB_REPOSITORY"

      - name: Remove temporary keychain
        if: always()
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
